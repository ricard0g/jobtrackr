worker_processes 1;
error_log /tmp/jobtrackr-nginx-error.log warn;
pid /tmp/jobtrackr-nginx.pid;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	access_log /tmp/jobtrackr-nginx-access.log;
	client_body_temp_path /tmp/jobtrackr-nginx-client-body;
	proxy_temp_path /tmp/jobtrackr-nginx-proxy;
	fastcgi_temp_path /tmp/jobtrackr-nginx-fastcgi;
	uwsgi_temp_path /tmp/jobtrackr-nginx-uwsgi;
	scgi_temp_path /tmp/jobtrackr-nginx-scgi;

	map $http_upgrade $connection_upgrade {
		default upgrade;
		"" close;
	}

	server {
		listen 127.0.0.1:9080;
		server_name _;

		location /api/v1/ {
			proxy_pass http://127.0.0.1:8080;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;
			proxy_set_header X-Forwarded-Host $host;
		}

		location /auth/ {
			proxy_pass http://127.0.0.1:8080;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;
			proxy_set_header X-Forwarded-Host $host;
		}

		location / {
			proxy_pass http://localhost:5173;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;
			proxy_set_header X-Forwarded-Host $host;
		}
	}
}
