spring.application.name=jobtrackr_api

# SQL/Hibernate 
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true

spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

jwt.signing-key=${JWT_SIGNING_KEY}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
jwt.refresh-cookie-name=${JWT_REFRESH_COOKIE_NAME:refresh_token}
jwt.refresh-cookie-secure=${JWT_REFRESH_COOKIE_SECURE:false}
jwt.refresh-cookie-same-site=${JWT_REFRESH_COOKIE_SAME_SITE:Lax}

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size
spring.data.web.pageable.max-page-size=100

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

jobtrackr.r2.endpoint=${R2_ENDPOINT:}
jobtrackr.r2.access-key-id=${R2_ACCESS_KEY_ID:}
jobtrackr.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
jobtrackr.r2.bucket=${R2_BUCKET:}
jobtrackr.r2.signed-url-seconds=${R2_SIGNED_URL_SECONDS:60}

jobtrackr.cv-generation.service-base-url=${CV_GENERATION_SERVICE_BASE_URL:http://localhost:8081}
jobtrackr.cv-generation.service-token=${CV_GENERATION_SERVICE_TOKEN:dev-service-token}
jobtrackr.cv-generation.request-timeout=${CV_GENERATION_REQUEST_TIMEOUT:5m}
jobtrackr.cv-generation.worker-concurrency=${CV_GENERATION_WORKER_CONCURRENCY:1}
jobtrackr.cv-generation.worker-poll-ms=${CV_GENERATION_WORKER_POLL_MS:2000}
jobtrackr.cv-generation.cleanup-poll-ms=${CV_GENERATION_CLEANUP_POLL_MS:5000}
jobtrackr.cv-generation.lease-duration=${CV_GENERATION_LEASE_DURATION:15m}
jobtrackr.cv-generation.max-attempts=${CV_GENERATION_MAX_ATTEMPTS:3}
jobtrackr.cv-generation.max-cleanup-attempts=${CV_GENERATION_MAX_CLEANUP_ATTEMPTS:10}
jobtrackr.cv-generation.max-application-cvs=${CV_GENERATION_MAX_APPLICATION_CVS:20}
jobtrackr.cv-generation.max-job-description-chars=${CV_GENERATION_MAX_JOB_DESCRIPTION_CHARS:50000}
jobtrackr.cv-generation.max-additional-info-chars=${CV_GENERATION_MAX_ADDITIONAL_INFO_CHARS:5000}
jobtrackr.cv-generation.consent-version=${CV_GENERATION_CONSENT_VERSION:v1}
jobtrackr.cv-generation.purge-failed-after-days=${CV_GENERATION_PURGE_FAILED_AFTER_DAYS:15}
jobtrackr.cv-generation.purge-cron=${CV_GENERATION_PURGE_CRON:0 15 3 * * *}
