services:
  postgres:
    image: postgres:16
    container_name: jobtrackr-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobtrackr}
      POSTGRES_USER: ${POSTGRES_USER:-jobtrackr_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobtrackr_app}
    volumes:
      - jobtrackr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-jobtrackr_app} -d ${POSTGRES_DB:-jobtrackr}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  cv-generation:
    build:
      context: ./cv-generation-service
    container_name: jobtrackr-cv-generation
    ports:
      - "${CV_GENERATION_PORT:-8081}:8081"
    environment:
      CV_GENERATION_SERVICE_TOKEN: ${CV_GENERATION_SERVICE_TOKEN:-dev-service-token}
      CV_GENERATION_PROVIDER: ${CV_GENERATION_PROVIDER:-gemini}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CV_GENERATION_MODEL_ID: ${CV_GENERATION_MODEL_ID:-gemini-3.1-flash-lite}
      CV_GENERATION_WORKFLOW_VERSION: ${CV_GENERATION_WORKFLOW_VERSION:-cv-graph-v2}
      HOST: 0.0.0.0
      PORT: 8081
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health/live')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  jobtrackr_pgdata:
